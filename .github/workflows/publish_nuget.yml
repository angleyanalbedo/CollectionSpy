name: Publish to NuGet

on:
  push:
    tags:
      - 'v*' # Trigger on version tags, e.g. v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      id-token: write # Required for NuGet.org Trusted Publishing
      contents: read  # Required for actions/checkout
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          6.0.x

    - name: Setup NuGet.exe
      uses: nuget/setup-nuget@v1
      with:
        nuget-version: 'latest'
          
    - name: Restore dependencies
      run: dotnet restore TrapLibrary/Debugging.Traps.csproj
      
    - name: Build
      run: |
        $Version = "${{ github.ref_name }}".TrimStart('v')
        if ("${{ github.ref_type }}" -eq "tag") {
            dotnet build TrapLibrary/Debugging.Traps.csproj --configuration Release /p:Version=$Version
        } else {
            dotnet build TrapLibrary/Debugging.Traps.csproj --configuration Release
        }
      shell: pwsh

    - name: Pack
      run: |
        $Version = "${{ github.ref_name }}".TrimStart('v')
        if ("${{ github.ref_type }}" -eq "tag") {
            dotnet pack TrapLibrary/Debugging.Traps.csproj --configuration Release --no-build --output ./nupkgs /p:Version=$Version
        } else {
            dotnet pack TrapLibrary/Debugging.Traps.csproj --configuration Release --no-build --output ./nupkgs
        }
      shell: pwsh
      
    - name: Verify Package Creation
      run: ls ./nupkgs
      
    - name: Publish to NuGet (Trusted Publishing)
      # Use Get-ChildItem to resolve the file path explicitly
      run: |
        foreach($file in (Get-ChildItem "./nupkgs/*.nupkg")) {
            nuget push $file.FullName -Source https://api.nuget.org/v3/index.json -SkipDuplicate -ApiKey "TrustedPublishing"
        }
